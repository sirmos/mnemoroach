<svg width="680" height="410" viewBox="0 0 680 410" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Mnemoroach architecture</title>
<desc>An agent loop on AWS Lambda calls Amazon Bedrock and reads and writes memory in CockroachDB Cloud. Claude Code or Cursor connect through the MCP server, and the ccloud CLI handles provisioning and operations, both reaching into CockroachDB.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="330" y="20" width="140" height="50" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="400" y="38" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">ccloud CLI</text>
<text x="400" y="55" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">provision + ops</text>

<rect x="490" y="20" width="150" height="50" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="565" y="38" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">MCP server</text>
<text x="565" y="55" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">read-only, audited</text>

<line x1="400" y1="70" x2="400" y2="100" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="565" y1="70" x2="565" y2="100" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="100" width="260" height="270" rx="20" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="60" y="125" font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53">AWS</text>
<text x="60" y="143" font-family="sans-serif" font-size="12" fill="#0C447C">compute + models</text>

<rect x="60" y="160" width="220" height="90" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="170" y="192" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">Agent loop</text>
<text x="170" y="212" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#085041">AWS Lambda</text>

<rect x="60" y="260" width="220" height="90" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="170" y="292" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">Bedrock</text>
<text x="170" y="312" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#085041">model + embeddings</text>

<rect x="380" y="100" width="260" height="270" rx="20" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="400" y="125" font-family="sans-serif" font-size="14" font-weight="500" fill="#173404">CockroachDB Cloud</text>
<text x="400" y="143" font-family="sans-serif" font-size="12" fill="#27500A">memory layer</text>

<rect x="400" y="160" width="220" height="65" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="510" y="185" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">memories</text>
<text x="510" y="203" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">vector search</text>

<rect x="400" y="235" width="220" height="65" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="510" y="260" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">task_state</text>
<text x="510" y="278" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">crash resume</text>

<rect x="400" y="310" width="220" height="40" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="510" y="330" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">memory_audit</text>

<text x="340" y="200" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#444441">read /</text>
<text x="340" y="214" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#444441">write</text>
<line x1="300" y1="205" x2="380" y2="205" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>